<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Water AI</title>
<meta name="description" content="Sign in to your Water AI account.">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://www.waterai.app/login/login.html">
<link rel="icon" href="../favicon.ico" sizes="any">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<nav class="nav">
  <div class="container">
    <a href="../index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 2C12 2 5 11 5 15.5C5 19.09 8.13 22 12 22C15.87 22 19 19.09 19 15.5C19 11 12 2 12 2Z" fill="#1F7A8C"/>
      </svg>
      Water AI
    </a>
    <div class="nav-links">
      <a href="../index.html#features">Product</a>
      <a href="../index.html#pricing">Pricing</a>
      <a href="../chat.html">Chat</a>
    </div>
    <div class="nav-actions">
      <a href="signup.html" class="btn btn-ghost">Create account</a>
    </div>
  </div>
</nav>

<main class="auth-page">
  <div class="auth-card">
    <span class="eyebrow">Welcome back</span>
    <h1>Sign in to Water AI</h1>
    <p class="sub">Pick up your conversations right where you left off.</p>

    <form id="login-form" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="••••••••">

      <p id="auth-error" class="auth-error" hidden></p>

      <button type="submit" class="btn btn-primary btn-block" id="login-submit">Sign In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>
</main>

<div id="toast"></div>

<script type="module">
  import { supabase } from "../supabase-client.js";

  const form = document.getElementById("login-form");
  const errorEl = document.getElementById("auth-error");
  const submitBtn = document.getElementById("login-submit");

  // If already signed in, skip straight to chat.
  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = "../chat.html";
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.hidden = true;
    submitBtn.disabled = true;
    submitBtn.textContent = "Signing in...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = error.message;
      errorEl.hidden = false;
      submitBtn.disabled = false;
      submitBtn.textContent = "Sign In";
      return;
    }

    window.location.href = "../chat.html";
  });
</script>
</body>
</html>
