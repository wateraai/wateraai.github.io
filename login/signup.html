<head>

<body>

<nav class="nav">
  <div class="container">
    <a href="../index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

      <a href="login.html" class="btn btn-ghost">Sign in</a>

<main class="auth-page">
  <div class="auth-card">
    <span class="eyebrow">Get started</span>
    <h1>Create your Water AI account</h1>
    <p class="sub">Free to join. Upgrade any time for higher limits and saved chat history.</p>

    <form id="signup-form" novalidate>
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@example.com">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="new-password" required minlength="6" placeholder="At least 6 characters">

      <label for="confirm-password">Confirm password</label>
      <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" required minlength="6" placeholder="Re-enter your password">

      <p id="auth-error" class="auth-error" hidden></p>
      <p id="auth-success" class="auth-success" hidden></p>

      <button type="submit" class="btn btn-primary btn-block" id="signup-submit">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</main>

<div id="toast"></div>

<script type="module">
  import { supabase } from "../supabase-client.js";

  const form = document.getElementById("signup-form");
  const errorEl = document.getElementById("auth-error");
  const successEl = document.getElementById("auth-success");
  const submitBtn = document.getElementById("signup-submit");
  const RATE_LIMIT_KEY = 'signupRateLimit';
  const RATE_LIMIT_MS = 60_000; // 60s

  function startCountdown(key, until, button, defaultText) {
    button.disabled = true;
    const tick = () => {
      const remaining = Math.max(0, Math.ceil((until - Date.now()) / 1000));
      if (remaining <= 0) {
        clearInterval(intervalId);
        localStorage.removeItem(key);
        button.disabled = false;
        button.textContent = defaultText;
        return;
      }
      button.textContent = `Try again in ${remaining}s`;
    };
    tick();
    const intervalId = setInterval(tick, 1000);
    return intervalId;
  }

  function applyRateLimit(key, ms = RATE_LIMIT_MS) {
    const until = Date.now() + ms;
    localStorage.setItem(key, String(until));
    startCountdown(key, until, submitBtn, 'Create Account');
  }

  supabase.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = "../chat.html";
  });

  // Restore any persisted rate-limit state on load.
  const storedUntil = parseInt(localStorage.getItem(RATE_LIMIT_KEY));
  if (!Number.isNaN(storedUntil) && storedUntil > Date.now()) {
    startCountdown(RATE_LIMIT_KEY, storedUntil, submitBtn, 'Create Account');
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorEl.hidden = true;
    successEl.hidden = true;

    if (submitBtn.disabled) return;

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
